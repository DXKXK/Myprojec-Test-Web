<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="Title">Document</title>
    <script>
        window.onload = function () {
            // 加载游戏数据
            const data = JSON.parse(localStorage.getItem('gameData'));
            if (data) {
                localStorage.removeItem('gameData');
                data.url = '../';
                document.documentElement.style.setProperty('--Selected', `url(${data.url}/GameAssets/LevelCard/Selected.png)`);
                document.documentElement.style.setProperty('--LevelContent', `url(${data.url}/GameAssets/LevelCard/Letter_Content.png)`);
                document.documentElement.style.setProperty('--LetterContent', `url(${data.url}/GameAssets/LevelCard/Letter_Chose.png)`);
                document.documentElement.style.setProperty('--ChapterBG', `url(${data.url}/GameAssets/LevelCard/Selected_Hover.png)`);
            } else {
                alert("游戏数据丢失");
                return;
            }
            // 加载Spine运行时
            const spine_runtime = document.createElement('script');
            spine_runtime.src = `${data.url}/JS/spine-player.js`;
            document.body.appendChild(spine_runtime);
            spine_runtime.onload = function () {
                // 加载JS脚本
                const script = document.createElement('script');
                script.src = `${data.url}/JS/game.js`;
                document.body.appendChild(script);
                script.onload = function () {
                    init(data);
                };
            }
            // 加载网页图标
            const link_icon = document.createElement('link');
            link_icon.rel = 'icon';
            link_icon.href = `${data.url}/GameAssets/${data.game}/Icon.png`;
            document.head.appendChild(link_icon);
            // 加载CSS样式
            const link_css = document.createElement('link');
            link_css.rel = 'stylesheet';
            link_css.href = `${data.url}/CSS/game.css`;
            document.head.appendChild(link_css);
            // 设置标题
            document.title = `Sakura Hime ${data.game}`;
        }
    </script>
</head>

<body>
    <div class="webbg">
        <div class="spinebg" id="SpineBg">
            <div class="close" id="CloseBtn"></div>
        </div>
        <div class="levelchoselist" id="LevelChooseList"></div>
        <div class="gamechoseBG" id="GameChoseBG">
            <div class="lettercontent" id="LetterContent">
                <div class="lettercharactername" id="LetterCharacterName"></div>
                <div class="letterstory" id="LetterStory"></div>
                <div class="chapter" id="Chapter"></div>
            </div>
            <img id="Idle" alt="立绘">
        </div>
    </div>
</body>

</html>
