<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Hime</title>
    <link rel="icon" type="image/x-icon" href="./GameAssets/Flower.png"/>
    <link rel="stylesheet" href="./CSS/spine-player.css">
    <link rel="stylesheet" href="./CSS/stayle.css">
    <script src="./JS/spine-player.js"></script>
</head>
<body>
    <!-- 游戏轮播界面 -->
    <div class="container flex-center-colume">
        <div class="content flex-center-colume">
            <div class="item active" id="Game0"></div>
            <div class="item active" id="Game1"></div>
            <div class="item active" id="Game2"></div>
            <div class="item active" id="Game3"></div>
            <div class="item active" id="Game4"></div>
            <div class="BG" id="BG"></div>
        </div>
        <div class="imgbox" id="ImgBox">
            <img id="GameLogo" src="" alt="游戏Logo">
        </div>
        <!-- 控制按钮 -->
        <div class="GameStart flex-center-row" id="GameStart">
            <p>开始游戏</p>
            <img src="./GameAssets/Flower.png" alt="樱花">
        </div>
        <div class="GameReturn flex-center-row" id="GameReturn">
            <p>返回选择</p>
            <img src="./GameAssets/Flower.png" alt="樱花">
        </div>
        <div class="GameReSet flex-center-row" id="GameReSet">
            <p>重置进度</p>
            <img src="./GameAssets/Flower.png" alt="樱花">
        </div>

    </div>

    <script src="./JS/script.js"></script>
</body>
</html>
